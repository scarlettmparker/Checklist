mutation attachChecklistObject($source: ID!, $target: ID!, $ownerType: RemoteObjectType) {
  checklistMutations {
    attachObject(source: $source, target: $target, ownerType: $ownerType) {
      ... on QuerySuccess {
      __typename
      message
        id
      }
      ... on StandardError {
      __typename
      message
      }
    }
  }
}
