mutation createChecklistTemplate($name: String!, $description: String, $itemIds: [ID!]) {
  checklistMutations {
    createTemplate(name: $name, description: $description, itemIds: $itemIds) {
      ... on QuerySuccess {
      __typename
      message
        id
      }
      ... on StandardError {
      __typename
      message
      }
    }
  }
}
