mutation createChecklistItem($name: String!, $description: String, $categoryId: ID) {
  checklistMutations {
    createItem(name: $name, description: $description, categoryId: $categoryId) {
      ... on QuerySuccess {
      __typename
      message
        id
      }
      ... on StandardError {
      __typename
      message
      }
    }
  }
}
