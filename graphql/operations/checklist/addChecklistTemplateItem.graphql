mutation addChecklistTemplateItem($templateId: ID!, $itemId: ID!, $position: Int) {
  checklistMutations {
    addTemplateItem(templateId: $templateId, itemId: $itemId, position: $position) {
      ... on QuerySuccess {
      __typename
      message
        id
      }
      ... on StandardError {
      __typename
      message
      }
    }
  }
}
