mutation addChecklistItem($entryId: ID!, $itemId: ID!, $position: Int) {
  checklistMutations {
    addItem(entryId: $entryId, itemId: $itemId, position: $position) {
      ... on QuerySuccess {
      __typename
      message
        id
      }
      ... on StandardError {
      __typename
      message
      }
    }
  }
}
